<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">llm-bench case study</title>
  <desc id="desc">A mobile-readable instrument plate explaining llm-bench through its problem, system, evidence, and code-verified evaluation flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#080b09"/>
      <stop offset=".48" stop-color="#141914"/>
      <stop offset="1" stop-color="#252b22"/>
    </linearGradient>
    <pattern id="ticks" width="30" height="12" patternUnits="userSpaceOnUse">
      <path d="M0 0V7" stroke="#99a08f" stroke-opacity=".16"/>
    </pattern>
  </defs>
  <rect width="720" height="560" rx="6" fill="url(#bg)"/>
  <rect x="20" y="20" width="680" height="520" fill="none" stroke="#92998b" stroke-opacity=".34"/>
  <rect x="20" y="20" width="680" height="12" fill="url(#ticks)"/>
  <path d="M20 98H700" stroke="#92998b" stroke-opacity=".34"/>
  <rect x="692" y="20" width="8" height="78" fill="#c8ff3d"/>

  <g font-family="'IBM Plex Mono','Cascadia Code','Courier New',monospace">
    <text x="44" y="50" fill="#c8ff3d" font-size="16" font-weight="700" letter-spacing="2.2">03 / MODEL EVALUATION</text>
    <text x="44" y="83" fill="#f1eadb" font-family="Baskerville,Georgia,serif" font-size="36" font-weight="700">llm-bench</text>
    <text x="678" y="64" fill="#a5a195" font-size="15" font-weight="700" text-anchor="end">NO LLM-AS-JUDGE ↗</text>

    <text x="44" y="127" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">PROBLEM</text>
    <text x="44" y="164" fill="#f1eadb" font-size="30" font-weight="300">Model rankings reward persuasive</text>
    <text x="44" y="201" fill="#f1eadb" font-size="30" font-weight="300">answers over completed work.</text>

    <text x="44" y="238" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">ENGINEERED SYSTEM</text>
    <text x="44" y="275" fill="#f1eadb" font-size="30" font-weight="300">Fixed tasks run across providers;</text>
    <text x="44" y="312" fill="#f1eadb" font-size="30" font-weight="300">code grades every result.</text>

    <text x="44" y="350" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">EVIDENCE</text>
    <text x="44" y="385" fill="#f1eadb" font-size="24" font-weight="700">21 tasks / code-based verification</text>

    <rect x="32" y="416" width="656" height="88" fill="#121712" stroke="#8a9283" stroke-opacity=".5"/>
    <text x="50" y="441" fill="#aaa79a" font-size="14" font-weight="700" letter-spacing="1.4">EVALUATION FLOW</text>
    <g font-size="22" font-weight="700" text-anchor="middle">
      <rect x="50" y="453" width="136" height="38" fill="#171d17" stroke="#7e8678"/>
      <text x="118" y="480" fill="#f1eadb">TASK</text>
      <path d="M186 472H218" stroke="#c8ff3d" stroke-width="3"/>
      <path d="M212 466L219 472 212 478" fill="none" stroke="#c8ff3d" stroke-width="2"/>
      <rect x="219" y="453" width="136" height="38" fill="#171d17" stroke="#7e8678"/>
      <text x="287" y="480" fill="#f1eadb">MODEL</text>
      <path d="M355 472H387" stroke="#c8ff3d" stroke-width="3"/>
      <path d="M381 466L388 472 381 478" fill="none" stroke="#c8ff3d" stroke-width="2"/>
      <rect x="388" y="453" width="178" height="38" fill="#c8ff3d" fill-opacity=".08" stroke="#c8ff3d"/>
      <text x="477" y="480" fill="#c8ff3d">VERIFY</text>
      <path d="M566 472H594" stroke="#c8ff3d" stroke-width="3"/>
      <circle cx="614" cy="472" r="14" fill="#c8ff3d"/>
      <path d="M607 472L612 477 621 466" fill="none" stroke="#111512" stroke-width="3"/>
      <text x="655" y="480" fill="#f1eadb">PASS</text>
    </g>
    <text x="678" y="529" fill="#c8ff3d" font-size="15" font-weight="700" text-anchor="end">github.com/ariaxhan/llm-bench  ↗</text>
  </g>
</svg>
