<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-labelledby="title desc">
  <title id="title">llm-bench</title>
  <desc id="desc">Evaluates models on fixed real-work tasks with code verification rather than an LLM judge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0"><stop stop-color="#13110f"/><stop offset=".2" stop-color="#171512"/><stop offset=".47" stop-color="#1c1916"/><stop offset=".72" stop-color="#221e1a"/><stop offset="1" stop-color="#29241f"/></linearGradient>
    <radialGradient id="warm" cx="80%" cy="80%" r="90%"><stop stop-color="#49372f" stop-opacity=".12"/><stop offset="1" stop-color="#171512" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="720" height="200" fill="url(#bg)"/><rect width="720" height="200" fill="url(#warm)"/>
  <rect x="14" y="12" width="692" height="176" fill="none" stroke="#4a443c"/>
  <path d="M14 188H190" stroke="#c47b61" stroke-width="2"/>
  <g font-family="'Azeret Mono','IBM Plex Mono','Courier New',monospace">
    <text x="32" y="39" fill="#c47b61" font-size="13" letter-spacing="2">03</text>
    <text x="78" y="44" fill="#eee6d8" font-family="'Iowan Old Style',Baskerville,Georgia,serif" font-size="32" font-weight="300">llm-bench</text>
    <text x="548" y="38" fill="#948b7e" font-size="11" letter-spacing="1.5">MODEL EVALUATION</text>
    <path d="M32 61H688" stroke="#4a443c"/>
    <text x="32" y="98" fill="#ddd4c6" font-family="'Iowan Old Style',Baskerville,Georgia,serif" font-size="26" font-style="italic">Model rankings reward persuasive answers.</text>
    <text x="32" y="132" fill="#c1b8aa" font-size="20">fixed tasks  →  provider adapters  →  code verification</text>
    <circle cx="34" cy="165" r="3" fill="#c47b61"/>
    <text x="48" y="169" fill="#948b7e" font-size="13" letter-spacing="1">PYTHON  ·  21 TASKS  ·  NO LLM-AS-JUDGE</text>
    <text x="675" y="169" fill="#c47b61" font-size="16" text-anchor="end">↗</text>
  </g>
</svg>
