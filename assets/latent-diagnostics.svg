<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">latent-diagnostics case study</title>
  <desc id="desc">A mobile-readable instrument plate explaining latent-diagnostics through its problem, system, evidence, and controlled signal flow.</desc>
  <defs>
    <linearGradient id="bg" x1="1" y1="0" x2="0" y2="1">
      <stop stop-color="#242b22"/>
      <stop offset=".5" stop-color="#131813"/>
      <stop offset="1" stop-color="#080b09"/>
    </linearGradient>
    <pattern id="points" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#9da492" fill-opacity=".14"/>
    </pattern>
  </defs>
  <rect width="720" height="560" rx="6" fill="url(#bg)"/>
  <rect width="720" height="560" rx="6" fill="url(#points)"/>
  <rect x="20" y="20" width="680" height="520" fill="none" stroke="#92998b" stroke-opacity=".34"/>
  <path d="M20 98H700" stroke="#92998b" stroke-opacity=".34"/>
  <path d="M476 20H700" stroke="#c8ff3d" stroke-width="4"/>

  <g font-family="'IBM Plex Mono','Cascadia Code','Courier New',monospace">
    <text x="44" y="50" fill="#c8ff3d" font-size="16" font-weight="700" letter-spacing="2.2">05 / INTERPRETABILITY</text>
    <text x="44" y="83" fill="#f1eadb" font-family="Baskerville,Georgia,serif" font-size="36" font-weight="700">latent-diagnostics</text>
    <text x="678" y="64" fill="#a5a195" font-size="15" font-weight="700" text-anchor="end">CONTROLLED ANALYSIS ↗</text>

    <text x="44" y="127" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">PROBLEM</text>
    <text x="44" y="164" fill="#f1eadb" font-size="30" font-weight="300">Signals look meaningful until</text>
    <text x="44" y="201" fill="#f1eadb" font-size="30" font-weight="300">controls remove confounds.</text>

    <text x="44" y="238" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">ENGINEERED SYSTEM</text>
    <text x="44" y="275" fill="#f1eadb" font-size="30" font-weight="300">Attribution graphs measure task</text>
    <text x="44" y="312" fill="#f1eadb" font-size="30" font-weight="300">geometry under controls.</text>

    <text x="44" y="344" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">EVIDENCE</text>
    <text x="44" y="374" fill="#f1eadb" font-size="23" font-weight="700">Task domain survived controls.</text>
    <text x="44" y="403" fill="#aaa79a" font-size="22" font-weight="300">Truthfulness did not — preserved.</text>

    <rect x="32" y="416" width="656" height="88" fill="#121712" stroke="#8a9283" stroke-opacity=".5"/>
    <text x="50" y="441" fill="#aaa79a" font-size="14" font-weight="700" letter-spacing="1.4">CONTROL STACK</text>
    <g font-size="22" font-weight="700" text-anchor="middle">
      <rect x="50" y="453" width="142" height="38" fill="#171d17" stroke="#7e8678"/>
      <text x="121" y="480" fill="#f1eadb">GRAPH</text>
      <path d="M192 472H228" stroke="#c8ff3d" stroke-width="3"/>
      <path d="M222 466L229 472 222 478" fill="none" stroke="#c8ff3d" stroke-width="2"/>
      <rect x="229" y="453" width="172" height="38" fill="#171d17" stroke="#7e8678"/>
      <text x="315" y="480" fill="#f1eadb">CONTROL</text>
      <path d="M401 472H437" stroke="#c8ff3d" stroke-width="3"/>
      <path d="M431 466L438 472 431 478" fill="none" stroke="#c8ff3d" stroke-width="2"/>
      <rect x="438" y="453" width="105" height="38" fill="#c8ff3d" fill-opacity=".08" stroke="#c8ff3d"/>
      <text x="490" y="480" fill="#c8ff3d">KEEP</text>
      <rect x="555" y="453" width="115" height="38" fill="#171d17" stroke="#7e8678"/>
      <text x="612" y="480" fill="#aaa79a">DROP</text>
    </g>
    <path d="M401 472H437M437 472V444H612V452" fill="none" stroke="#858d7f" stroke-width="2" stroke-dasharray="4 5"/>
    <text x="678" y="529" fill="#c8ff3d" font-size="15" font-weight="700" text-anchor="end">github.com/ariaxhan/latent-diagnostics  ↗</text>
  </g>
</svg>
