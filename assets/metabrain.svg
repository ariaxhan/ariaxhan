<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">metabrain case study</title>
  <desc id="desc">A mobile-readable instrument plate explaining metabrain through its problem, system, evidence, and evidence-graduation flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#222920"/>
      <stop offset=".54" stop-color="#121712"/>
      <stop offset="1" stop-color="#080b09"/>
    </linearGradient>
    <radialGradient id="glow" cx="62%" cy="80%" r="55%">
      <stop stop-color="#c8ff3d" stop-opacity=".1"/>
      <stop offset="1" stop-color="#c8ff3d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="720" height="560" rx="6" fill="url(#bg)"/>
  <rect width="720" height="560" rx="6" fill="url(#glow)"/>
  <rect x="20" y="20" width="680" height="520" fill="none" stroke="#92998b" stroke-opacity=".34"/>
  <path d="M20 98H700" stroke="#92998b" stroke-opacity=".34"/>
  <path d="M20 540V386" stroke="#c8ff3d" stroke-width="6"/>

  <g font-family="'IBM Plex Mono','Cascadia Code','Courier New',monospace">
    <text x="44" y="50" fill="#c8ff3d" font-size="16" font-weight="700" letter-spacing="2.2">04 / AGENT MEMORY</text>
    <text x="44" y="83" fill="#f1eadb" font-family="Baskerville,Georgia,serif" font-size="36" font-weight="700">metabrain</text>
    <text x="678" y="64" fill="#a5a195" font-size="15" font-weight="700" text-anchor="end">PYTHON + SQLITE ↗</text>

    <text x="44" y="127" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">PROBLEM</text>
    <text x="44" y="164" fill="#f1eadb" font-size="30" font-weight="300">Agent memory stores observations</text>
    <text x="44" y="201" fill="#f1eadb" font-size="30" font-weight="300">without testing the lesson.</text>

    <text x="44" y="238" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">ENGINEERED SYSTEM</text>
    <text x="44" y="275" fill="#f1eadb" font-size="30" font-weight="300">Learnings become hypotheses;</text>
    <text x="44" y="312" fill="#f1eadb" font-size="30" font-weight="300">experiments earn preferences.</text>

    <text x="44" y="344" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">EVIDENCE</text>
    <text x="44" y="374" fill="#f1eadb" font-size="23" font-weight="700">PyPI / zero runtime dependencies</text>
    <text x="44" y="403" fill="#aaa79a" font-size="22" font-weight="300">WAL / calibrated on 5,066 learnings</text>

    <rect x="32" y="416" width="656" height="88" fill="#121712" stroke="#8a9283" stroke-opacity=".5"/>
    <text x="50" y="441" fill="#aaa79a" font-size="14" font-weight="700" letter-spacing="1.4">EVIDENCE GRADUATION</text>
    <g font-size="22" font-weight="700" text-anchor="middle">
      <rect x="50" y="453" width="158" height="38" fill="#171d17" stroke="#7e8678"/>
      <text x="129" y="480" fill="#f1eadb">LEARNING</text>
      <path d="M208 472H249" stroke="#c8ff3d" stroke-width="3"/>
      <path d="M243 466L250 472 243 478" fill="none" stroke="#c8ff3d" stroke-width="2"/>
      <rect x="250" y="453" width="132" height="38" fill="#171d17" stroke="#7e8678"/>
      <text x="316" y="480" fill="#f1eadb">TEST</text>
      <path d="M382 472H423" stroke="#c8ff3d" stroke-width="3"/>
      <path d="M417 466L424 472 417 478" fill="none" stroke="#c8ff3d" stroke-width="2"/>
      <rect x="424" y="453" width="246" height="38" fill="#c8ff3d" fill-opacity=".08" stroke="#c8ff3d"/>
      <text x="547" y="480" fill="#c8ff3d">PREFERENCE</text>
    </g>
    <text x="678" y="529" fill="#c8ff3d" font-size="15" font-weight="700" text-anchor="end">github.com/ariaxhan/metabrain  ↗</text>
  </g>
</svg>
