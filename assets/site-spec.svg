<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">site-spec case study</title>
  <desc id="desc">A mobile-readable instrument plate explaining site-spec through its problem, system, evidence, and crawl pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#242b22"/>
      <stop offset=".44" stop-color="#141914"/>
      <stop offset="1" stop-color="#090c0a"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#1d241d"/>
      <stop offset="1" stop-color="#101410"/>
    </linearGradient>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#949b8c" stroke-opacity=".07"/>
    </pattern>
  </defs>
  <rect width="720" height="560" rx="6" fill="url(#bg)"/>
  <rect width="720" height="560" rx="6" fill="url(#grid)"/>
  <rect x="20" y="20" width="680" height="520" fill="none" stroke="#92998b" stroke-opacity=".34"/>
  <path d="M20 98H700" stroke="#92998b" stroke-opacity=".34"/>
  <rect x="20" y="20" width="8" height="78" fill="#c8ff3d"/>

  <g font-family="'IBM Plex Mono','Cascadia Code','Courier New',monospace">
    <text x="44" y="50" fill="#c8ff3d" font-size="16" font-weight="700" letter-spacing="2.2">01 / LEAD SYSTEM</text>
    <text x="44" y="83" fill="#f1eadb" font-family="Baskerville,Georgia,serif" font-size="36" font-weight="700">site-spec</text>
    <text x="678" y="64" fill="#a5a195" font-size="15" font-weight="700" text-anchor="end">TYPESCRIPT CLI ↗</text>

    <text x="44" y="127" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">PROBLEM</text>
    <text x="44" y="164" fill="#f1eadb" font-size="30" font-weight="300">Websites hide machine-readable</text>
    <text x="44" y="201" fill="#f1eadb" font-size="30" font-weight="300">failures until crawlers miss them.</text>

    <text x="44" y="238" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">ENGINEERED SYSTEM</text>
    <text x="44" y="275" fill="#f1eadb" font-size="30" font-weight="300">A live crawler feeds a pure core;</text>
    <text x="44" y="312" fill="#f1eadb" font-size="30" font-weight="300">checks emit an inspectable report.</text>

    <text x="44" y="350" fill="#c8ff3d" font-size="17" font-weight="700" letter-spacing="1.8">EVIDENCE</text>
    <text x="44" y="385" fill="#f1eadb" font-size="25" font-weight="700">139 tests / CI / 2 releases</text>

    <rect x="32" y="416" width="656" height="88" fill="url(#rail)" stroke="#8a9283" stroke-opacity=".5"/>
    <text x="50" y="441" fill="#aaa79a" font-size="14" font-weight="700" letter-spacing="1.4">AUDIT PIPELINE</text>
    <g font-size="22" font-weight="700" text-anchor="middle">
      <rect x="50" y="453" width="120" height="38" fill="#111512" stroke="#7e8678"/>
      <text x="110" y="480" fill="#f1eadb">URL</text>
      <path d="M170 472H200" stroke="#c8ff3d" stroke-width="3"/>
      <path d="M194 466L201 472 194 478" fill="none" stroke="#c8ff3d" stroke-width="2"/>
      <rect x="201" y="453" width="120" height="38" fill="#111512" stroke="#7e8678"/>
      <text x="261" y="480" fill="#f1eadb">CRAWL</text>
      <path d="M321 472H351" stroke="#c8ff3d" stroke-width="3"/>
      <path d="M345 466L352 472 345 478" fill="none" stroke="#c8ff3d" stroke-width="2"/>
      <rect x="352" y="453" width="120" height="38" fill="#c8ff3d" fill-opacity=".08" stroke="#c8ff3d"/>
      <text x="412" y="480" fill="#c8ff3d">CORE</text>
      <path d="M472 472H502" stroke="#c8ff3d" stroke-width="3"/>
      <path d="M496 466L503 472 496 478" fill="none" stroke="#c8ff3d" stroke-width="2"/>
      <rect x="503" y="453" width="167" height="38" fill="#111512" stroke="#7e8678"/>
      <text x="586" y="480" fill="#f1eadb">REPORT</text>
    </g>
    <text x="678" y="529" fill="#c8ff3d" font-size="15" font-weight="700" text-anchor="end">github.com/ariaxhan/site-spec  ↗</text>
  </g>
</svg>
